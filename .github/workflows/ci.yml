# WXGZH Platform — CI 流水线 (V2.0 S5 整合)
# ============================================================================
# 包含: lint / typecheck / test(+coverage) / swagger-sync / build / security
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Cycle scan
        run: ./scripts/cycle-scan.sh

  # ── TypeScript 类型检查 ─────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  # ── 单元测试 + 覆盖率 ───────────────────────────────────────────────
  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wxgzh
          POSTGRES_PASSWORD: wxgzh123
          POSTGRES_DB: wxgzh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
        env:
          DATABASE_URL: 'postgresql://wxgzh:wxgzh123@localhost:5432/wxgzh_test'
      - name: Run tests with coverage
        run: pnpm test:cov
        env:
          DATABASE_URL: 'postgresql://wxgzh:wxgzh123@localhost:5432/wxgzh_test'
          REDIS_URL: 'redis://localhost:6379/1'
          JWT_SECRET: 'test-secret-do-not-use-in-production'
          ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef'
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            apps/server/coverage/
            apps/web/coverage/
          retention-days: 14

  # ── Swagger 同步校验 (S2 实现,这里只接 job 框架) ──────────────────
  swagger:
    name: Swagger Sync
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      # S2 提供 swagger-sync.spec.ts;若未实现,--passWithNoTests 保证 job 仍能绿。
      - name: Run swagger-sync test
        run: cd apps/server && pnpm test swagger-sync --passWithNoTests

  # ── 构建检查 ────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, swagger]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm build
      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7
