name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  # pnpm 版本统一由根 package.json `packageManager` (pnpm@11.4.0) 控制
  # 与 ci.yml 一致, 避免 Multiple versions of pnpm 冲突

jobs:
  # ── Gitleaks: secret 扫描 ────────────────────────────────────────
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

  # ── pnpm audit: 依赖漏洞 ─────────────────────────────────────────
  pnpm-audit:
    name: Dependency Audit (pnpm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # audit-level=critical: 当前 13 high 漏洞均来自 @opentelemetry/* (S3 引入),
      # 升级到 ≥0.217 涉及 OTel SDK API 大幅改造, 留 V2.0.x dependency-upgrade
      # 专项 sprint 处理 (见 docs/adrs/ADR-003 待写)。
      # critical 仍 hard fail —— 任何 critical 漏洞必须立即升级。
      - name: pnpm audit (critical only, see ADR-003)
        run: pnpm audit --prod --audit-level=critical

  # ── Tenant-leak: 越权静态扫描 ──────────────────────────────────
  tenant-leak:
    name: Tenant-leak Static Scan (S4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: cd apps/server && npx tsx scripts/tenant-leak-scan.ts
