# E2E 测试流水线 (V2.0 S5 框架, S6 填充 test:e2e 实现)
# ============================================================================
# 触发: push 到 main / 手动 dispatch
# 现状: job 框架就绪, 等 S6 (auth.e2e / wechat-auth.e2e / broadcast.e2e) 落地后即可用。
name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wxgzh
          POSTGRES_PASSWORD: wxgzh123
          POSTGRES_DB: wxgzh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
        env:
          DATABASE_URL: 'postgresql://wxgzh:wxgzh123@localhost:5432/wxgzh_test'
      - name: Run migrations + seed test data
        run: |
          cd apps/server
          npx prisma migrate deploy
          pnpm db:seed:test
        env:
          DATABASE_URL: 'postgresql://wxgzh:wxgzh123@localhost:5432/wxgzh_test'
      - name: Run E2E tests
        run: pnpm --filter @wxgzh/server test:e2e
        env:
          DATABASE_URL: 'postgresql://wxgzh:wxgzh123@localhost:5432/wxgzh_test'
          REDIS_URL: 'redis://localhost:6379/1'
          JWT_SECRET: 'test-secret-do-not-use-in-production'
          ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef'
          NODE_ENV: 'test'
      - name: Upload E2E artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure
          path: |
            apps/server/test/e2e/screenshots/
            apps/server/test/e2e/logs/
          retention-days: 3
