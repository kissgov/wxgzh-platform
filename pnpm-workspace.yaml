packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  bcrypt: true
  cpu-features: false
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: false
  ssh2: false
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - bcrypt
  - esbuild
  - msgpackr-extract
  - prisma
ignoreWorkspaceRootCheck: true
