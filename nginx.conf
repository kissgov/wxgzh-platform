server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name wxgzh.kxrdyf.cn;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/wxgzh/apps/web/dist;
    client_max_body_size 20m;

    # ── 蓝绿部署: 从 /etc/nginx/slot.conf 读 active slot 端口 ──
    # 由 scripts/switch-traffic.sh 维护 (默认 3000=blue, 切到 green 改 3001)。
    # 缺失时 fallback 到 3000 (旧部署兼容)。
    set $slot_port 3000;
    if ( -f /etc/nginx/slot.conf ) {
        include /etc/nginx/slot.conf;
    }

    # ── 首页 (landing page) ──
    location = / {
        try_files /landing.html =404;
    }

    # ── SPA 路由 ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # V2.0 S5: 蓝绿端口随 $slot_port 切换
        proxy_pass http://127.0.0.1:$slot_port;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    #CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/wxgzh.kxrdyf.cn.conf;
    #CERT-APPLY-CHECK--END
    include /www/server/panel/vhost/nginx/extension/wxgzh.kxrdyf.cn/*.conf;

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/wxgzh.kxrdyf.cn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/wxgzh.kxrdyf.cn/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497  https://$host$request_uri;

    #SSL-END

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
    error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  PHP引用配置，可以注释或修改
    #清理缓存规则

    location ~ /purge(/.*) {
        proxy_cache_purge cache_one $host$1$is_args$args;
        #access_log  /www/wwwlogs/wxgzh.kxrdyf.cn_purge_cache.log;
    }
	#引用反向代理规则，注释后配置的反向代理将无效
	include /www/server/panel/vhost/nginx/proxy/wxgzh.kxrdyf.cn/*.conf;

	include enable-php-00.conf;
    #PHP-INFO-END

    #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效
    include /www/server/panel/vhost/rewrite/wxgzh.kxrdyf.cn.conf;
    #REWRITE-END

    #禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    #一键申请SSL证书验证目录相关设置
    location ~ \.well-known{
        allow all;
    }

    #禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }




    access_log  /www/wwwlogs/wxgzh.kxrdyf.cn.log;
    error_log  /www/wwwlogs/wxgzh.kxrdyf.cn.error.log;
}
