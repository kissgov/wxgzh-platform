# WXGZH Platform — 本地开发环境
# Usage: docker compose -f docker/docker-compose.yml up -d
# ============================================================================
services:
  # ── PostgreSQL 16 + PgBouncer ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wxgzh-postgres
    environment:
      POSTGRES_USER: wxgzh
      POSTGRES_PASSWORD: wxgzh123
      POSTGRES_DB: wxgzh_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wxgzh -d wxgzh_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: wxgzh-pgbouncer
    environment:
      DB_USER: wxgzh
      DB_PASSWORD: wxgzh123
      DB_HOST: postgres
      DB_NAME: wxgzh_dev
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    ports:
      - '6432:6432'
    depends_on:
      postgres:
        condition: service_healthy

  # ── Redis 7 ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wxgzh-redis
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass wxgzh_redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'wxgzh_redis', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible Object Storage) ───────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: wxgzh-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'  # API
      - '9001:9001'  # Console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 5s
      retries: 3

  # ── NestJS API Server ──────────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: wxgzh-server
    ports:
      - '3000:3000'
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://wxgzh:wxgzh123@postgres:5432/wxgzh_dev?schema=public
      - REDIS_URL=redis://:wxgzh_redis@redis:6379/0
      - OSS_ENDPOINT=minio
      - OSS_PORT=9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── BullMQ Worker (独立进程) ───────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: wxgzh-worker
    command: node dist/worker.js
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://wxgzh:wxgzh123@postgres:5432/wxgzh_dev?schema=public
      - REDIS_URL=redis://:wxgzh_redis@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── React Web (Nginx + SPA) ────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: wxgzh-web
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  pgdata:
  redisdata:
  miniodata:
